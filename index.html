<!DOCTYPE html>
<html>
<head>
<title>EMO Robot</title>

<!-- ✅ remove favicon error -->
<link rel="icon" href="data:,">

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at center, #0b1220, #05070f);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* FACE */
.face {
  position: relative;
  width: 320px;
  height: 220px;
}

/* EYES */
.eye {
  position: absolute;
  width: 80px;
  height: 80px;
  background: linear-gradient(145deg, #5fb3ff, #2f7fff);
  border-radius: 22px;
  transition: transform 0.08s linear, height 0.2s;
  box-shadow: 0 0 20px rgba(80,160,255,0.4);
}

.left { left: 30px; top: 40px; }
.right { right: 30px; top: 40px; }

.blink { height: 8px !important; }

/* SLEEP */
.sleep .eye {
  height: 6px !important;
}

/* MOUTH */
.mouth {
  position: absolute;
  bottom: 35px;
  left: 50%;
  transform: translateX(-50%);
  width: 100px;
  height: 18px;
  background: #5fb3ff;
  border-radius: 20px;
  transition: all 0.15s ease;
}

/* EMOTIONS */
.happy { height: 40px; border-radius: 0 0 60px 60px; }
.sad { transform: translateX(-50%) rotate(180deg); }
.surprised { width: 30px; height: 30px; border-radius: 50%; }
.angry { height: 20px; transform: translateX(-50%) rotate(180deg); }

/* TALK */
.talking {
  animation: talk 0.2s infinite alternate;
}

@keyframes talk {
  from { height: 10px; }
  to { height: 40px; }
}
</style>
</head>

<body>

<div class="face" id="face">
  <div class="eye left" id="eyeL"></div>
  <div class="eye right" id="eyeR"></div>
  <div class="mouth" id="mouth"></div>
</div>

<script>
const eyeL = document.getElementById("eyeL");
const eyeR = document.getElementById("eyeR");
const mouth = document.getElementById("mouth");
const face = document.getElementById("face");

//////////////////////////////////////////////////
// 🤖 AI SOCKET
//////////////////////////////////////////////////
let aiSocket;

function initSocket() {
  const URL = "ws://127.0.0.1:5678";
  console.log("Connecting:", URL);

  aiSocket = new WebSocket(URL);

  aiSocket.onopen = () => {
    console.log("🟢 Connected");
  };

  aiSocket.onmessage = (event) => {
    const reply = event.data;
    console.log("🤖", reply);

    // Emotion
    if (reply.includes("sad")) setEmotion("sad");
    else if (reply.includes("angry")) setEmotion("angry");
    else if (reply.includes("wow")) setEmotion("surprised");
    else setEmotion("happy");

    // Sleep
    if (reply.includes("sleep")) {
      face.classList.add("sleep");
    } else {
      face.classList.remove("sleep");
    }

    speak(reply);
  };

  aiSocket.onclose = () => {
    console.log("🔄 reconnecting...");
    setTimeout(initSocket, 2000);
  };
}

initSocket();

//////////////////////////////////////////////////
// 🔊 SPEAK
//////////////////////////////////////////////////
function speak(text) {
  const utter = new SpeechSynthesisUtterance(text);

  utter.onstart = () => {
    mouth.classList.add("talking");
  };

  utter.onend = () => {
    mouth.classList.remove("talking");
  };

  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

//////////////////////////////////////////////////
// 🎭 EMOTION
//////////////////////////////////////////////////
function setEmotion(e) {
  mouth.className = "mouth " + e;
}

//////////////////////////////////////////////////
// 👁️ BLINK
//////////////////////////////////////////////////
setInterval(() => {
  if (!face.classList.contains("sleep")) {
    eyeL.classList.add("blink");
    eyeR.classList.add("blink");

    setTimeout(() => {
      eyeL.classList.remove("blink");
      eyeR.classList.remove("blink");
    }, 120);
  }
}, 3000);
</script>

</body>
</html>
