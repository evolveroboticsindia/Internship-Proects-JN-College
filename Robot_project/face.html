<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Assistant</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0e27 0%, #16213e 100%);
      color: #00f7ff;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    /* ============================================
       ANIMATED FACE
       ============================================ */
    
    .face-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
    }

    .face {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }

    /* EYES */
    .eyes {
      display: flex;
      gap: 50px;
      margin-bottom: 40px;
    }

    .eye {
      width: 20px;
      height: 20px;
      background: #00f7ff;
      border-radius: 50%;
      box-shadow: 0 0 15px #00f7ff;
      transition: all 0.3s ease;
      position: relative;
    }

    .eye::before {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      background: #000;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* MOUTH */
    .mouth {
      width: 70px;
      height: 8px;
      background: #00f7ff;
      border-radius: 10px;
      box-shadow: 0 0 15px #00f7ff;
      transition: all 0.2s ease;
      transform-origin: center;
    }

    /* ANIMATIONS */

    /* Listening - eyes glow brighter */
    .face.listening .eye {
      box-shadow: 0 0 30px #00f7ff, 0 0 50px rgba(0, 247, 255, 0.5);
      animation: pulse-eyes 0.6s infinite;
    }

    @keyframes pulse-eyes {
      0%, 100% { box-shadow: 0 0 30px #00f7ff, 0 0 50px rgba(0, 247, 255, 0.5); }
      50% { box-shadow: 0 0 20px #00f7ff, 0 0 30px rgba(0, 247, 255, 0.3); }
    }

    /* Thinking - mouth becomes a dot and rotates */
    .face.thinking .mouth {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      animation: thinking-pulse 0.6s infinite;
    }

    @keyframes thinking-pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.3); opacity: 1; }
    }

    /* Speaking - mouth opens and closes */
    .face.speaking .mouth {
      animation: speak 0.15s infinite;
    }

    @keyframes speak {
      0%, 100% { height: 8px; width: 70px; }
      50% { height: 20px; width: 60px; }
    }

    /* Error - eyes turn red */
    .face.error .eye {
      background: #ff0055;
      box-shadow: 0 0 20px #ff0055;
    }

    .face.error .mouth {
      background: #ff0055;
      box-shadow: 0 0 20px #ff0055;
      transform: scaleY(-1);
    }

    /* Status Text */
    #status {
      text-align: center;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #00f7ff;
      min-height: 20px;
      opacity: 0.5;
      margin-top: 10px;
    }

    /* ============================================
       TRANSCRIPT DISPLAY
       ============================================ */

    .transcript-container {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 16px;
      min-height: 60px;
      max-height: 150px;
      overflow-y: auto;
    }

    .transcript-container::-webkit-scrollbar {
      width: 6px;
    }

    .transcript-container::-webkit-scrollbar-track {
      background: rgba(0, 247, 255, 0.1);
      border-radius: 3px;
    }

    .transcript-container::-webkit-scrollbar-thumb {
      background: rgba(0, 247, 255, 0.3);
      border-radius: 3px;
    }

    .transcript-container::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 247, 255, 0.5);
    }

    .message {
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.4;
      animation: slideIn 0.3s ease;
    }

    .message:last-child {
      margin-bottom: 0;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      color: #00d4ff;
      padding: 8px;
      background: rgba(0, 100, 150, 0.2);
      border-left: 3px solid #00d4ff;
      padding-left: 10px;
      border-radius: 4px;
    }

    .message.assistant {
      color: #00ff88;
      padding: 8px;
      background: rgba(0, 150, 100, 0.2);
      border-left: 3px solid #00ff88;
      padding-left: 10px;
      border-radius: 4px;
    }

    .message.error {
      color: #ff0055;
      padding: 8px;
      background: rgba(150, 0, 50, 0.2);
      border-left: 3px solid #ff0055;
      padding-left: 10px;
      border-radius: 4px;
    }

    .message.info {
      color: #ffaa00;
      padding: 8px;
      background: rgba(150, 100, 0, 0.2);
      border-left: 3px solid #ffaa00;
      padding-left: 10px;
      border-radius: 4px;
    }



    /* ============================================
       RESPONSIVE
       ============================================ */

    @media (max-width: 600px) {
      .container {
        gap: 20px;
      }

      .face-container {
        padding: 30px 20px;
      }

      .eyes {
        gap: 40px;
      }

      button {
        padding: 8px 16px;
        font-size: 12px;
      }
    }
  </style>

</head>

<body>

  <div class="container">
    
    <!-- ANIMATED FACE -->
    <div class="face-container">
      <div class="face" id="face">
        <div class="eyes">
          <div class="eye"></div>
          <div class="eye"></div>
        </div>
        <div class="mouth"></div>
      </div>
      <div id="status">IDLE</div>
    </div>

    <!-- TRANSCRIPT -->
    <div class="transcript-container" id="transcript">
    </div>

  </div>

  <!-- 🔗 External JS -->
  <script src="script.js"></script>

</body>
</html>
